# herp 鈥?Development / local build
# Builds the image from the local Dockerfile instead of pulling from GHCR.
# Use this when working on herp itself or testing Docker image changes.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  herp:
    build:
      context: .
      dockerfile: Dockerfile
    image: herp:dev
    container_name: herp-dev
    restart: unless-stopped

    ports:
      - '127.0.0.1:${herp_PORT:-3000}:3000'

    volumes:
      - ${herp_DATA:-./data}:/data

    user: '${PUID:-1000}:${PGID:-1000}'

    environment:
      # Your public URL 鈥?must match the address you access herp from.
      # Used for CSRF protection; the app will reject form submissions without it.
      ORIGIN: ${ORIGIN:-http://localhost:3000}

      NODE_ENV: production
      DATABASE_URL: /data/herp.db
      # Maximum image upload size in MB. BODY_SIZE_LIMIT is derived automatically.
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-10}
      # Maximum journal video upload size in MB (stored as-is, no transcoding).
      VIDEO_MAX_MB: ${VIDEO_MAX_MB:-100}
      # Maximum journal photos and videos (combined) per companion per day.
      MAX_DAILY_MEDIA: ${MAX_DAILY_MEDIA:-5}
      # Maximum documents (uploads and Paperless references) per companion.
      MAX_DOCUMENTS_PER_COMPANION: ${MAX_DOCUMENTS_PER_COMPANION:-200}
      # Default undo window (seconds) for dismissing a Reminder. 0 disables it.
      REMINDER_UNDO_SECONDS: ${REMINDER_UNDO_SECONDS:-7}

      # Optional: server-side video transcoding (off by default). When 'true',
      # uploaded videos are transcoded to H.264/AAC MP4 + poster in the
      # background so they play cross-browser. ffmpeg ships in the image.
      # Transcode scratch is written under /data; do not point it at /tmp (the
      # 64 MB RAM tmpfs below is too small for video).
      VIDEO_TRANSCODE: ${VIDEO_TRANSCODE:-false}
      VIDEO_KEEP_ORIGINAL: ${VIDEO_KEEP_ORIGINAL:-true}
      # VIDEO_TRANSCODE_MAX_MB / _MAX_SECONDS / _MAX_WIDTH / _MAX_HEIGHT cap cost.
      # VIDEO_TMP_DIR defaults to /data/transcode-tmp.

      # Set to your local timezone so dates and times display correctly.
      # Defaults to UTC if omitted. Example: America/New_York, Europe/London
      # TZ: ${TZ:-America/New_York}

      # Optional: external image storage (S3-compatible).
      # Set STORAGE_BACKEND=s3 + the S3_* vars to route new uploads to a
      # bucket. Existing photos stay on disk; reads honor per-row provider.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_PRESIGN_TTL_SECONDS: ${S3_PRESIGN_TTL_SECONDS:-300}

      # Optional: Immich integration (reference mode). Both URL and API key
      # must be set together for the picker to activate.
      IMMICH_URL: ${IMMICH_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      IMMICH_ALBUM_ID: ${IMMICH_ALBUM_ID:-}

      # Optional: Paperless-ngx document import (reference mode). Both URL and
      # token must be set together for the picker to activate.
      PAPERLESS_URL: ${PAPERLESS_URL:-}
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN:-}
      PAPERLESS_TAG_ID: ${PAPERLESS_TAG_ID:-}

      # Optional: SMTP email. Enables outbound mail and the "Forgot password?"
      # flow. Disabled unless SMTP_HOST and SMTP_FROM are both set.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

      # Optional: ntfy push notifications. Server config only; users set
      # their own topic in Settings. Disabled unless NTFY_URL is set.
      NTFY_URL: ${NTFY_URL:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}

      # Calendar feed: past-event window in days (0 = full history); set ENABLED=false to disable the feed
      CALENDAR_FEED_HISTORY_DAYS: ${CALENDAR_FEED_HISTORY_DAYS:-90}
      CALENDAR_FEED_ENABLED: ${CALENDAR_FEED_ENABLED:-true}

      # Bearer-token API (token creation + /api endpoints); set false to disable
      API_TOKENS_ENABLED: ${API_TOKENS_ENABLED:-true}

      # Read-only public demo mode. When true, login becomes a role picker and
      # all writes are blocked. Leave unset/false for real instances.
      DEMO_MODE: ${DEMO_MODE:-false}

      # Optional: two-factor authentication (2FA). 32-byte base64 key that
      # encrypts stored TOTP secrets. Required to enable 2FA.
      # Generate with: openssl rand -base64 32
      TWOFA_ENC_KEY: ${TWOFA_ENC_KEY:-}

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
